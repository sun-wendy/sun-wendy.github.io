<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Wendy Q. Sun</title>
    <link rel="icon" type="image/svg+xml" href="images/cat.png" />
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --text-light: #777777;
            --accent: #A31F34; 
            --link: #111111;
            --link-hover: #A31F34;
            --code-bg: #f5f5f5;
            
            /* FIXED: Matches index.html and blog.html exactly */
            --max-width: 960px; 
        }

        /* Global Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Newsreader', serif;
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.7; 
            font-size: 19px; 
        }

        h1, h2, h3, h4, .sans { font-family: 'Inter', sans-serif; }

        a { text-decoration: none; color: var(--link); transition: color 0.2s; }
        a:hover { color: var(--link-hover); }
        
        /* Layout Container - Matches Blog Exactly */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 4rem 20px;
        }

        /* --- Header / Nav (Identical to Blog) --- */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-family: 'Inter', sans-serif; /* Explicitly set font */
        }

        .logo {
            font-weight: 600;
            font-size: 1.1rem; /* Matches Blog font size */
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .nav-links a { color: var(--text-muted); }
        .nav-links a:hover { color: var(--accent); }

        /* --- Markdown Content --- */
        /* We constrain the reading width here separately 
           so the Header stays wide (aligned with blog) 
           but the text isn't too wide to read.
        */
        .markdown-wrapper {
            width: 100%;
            /* Optional: Center the content block */
            /* max-width: 800px; margin: 0 auto; */ 
        }

        #markdown-container {
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .markdown-content h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5em;
            letter-spacing: -0.02em;
            line-height: 1.2;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .markdown-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2em;
            margin-bottom: 0.8em;
            letter-spacing: -0.01em;
        }

        .markdown-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        .markdown-content p { margin-bottom: 1.5em; }
        .markdown-content strong { font-weight: 600; color: #000; }
        .markdown-content ul, .markdown-content ol { margin-bottom: 1.5em; padding-left: 20px; }
        .markdown-content li { margin-bottom: 0.5em; }

        .markdown-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin: 2em 0;
            font-style: italic;
            color: var(--text-muted);
            background: #fafafa;
            padding: 15px 20px;
        }

        .markdown-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .markdown-content pre {
            background: var(--code-bg);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5em;
        }
        
        .markdown-content pre code { background: none; padding: 0; font-size: 0.85em; }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 2em auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .markdown-content a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .markdown-content a:hover { color: #000; }

        .loading { text-align: center; color: var(--text-muted); margin-top: 50px; }
        .error { color: var(--accent); text-align: center; margin-top: 50px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            body { font-size: 17px; }
            .markdown-content h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="nav-header">
            <div class="logo"><a href="index.html">Wendy Q. Sun</a></div>
            <nav class="nav-links">
                <a href="blog.html">&larr; Back to Blog</a>
            </nav>
        </header>

        <div class="markdown-wrapper">
            <div id="markdown-container" class="markdown-content">
                <div class="loading">Loading article...</div>
            </div>
        </div>

        <div style="text-align:center; padding: 60px 0; color: #999; font-size: 0.8rem; font-family:'Inter',sans-serif;">
            &copy; 2026 Wendy Q. Sun. 
        </div>
    </div>

    <script>
        async function loadMarkdownFile() {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');
            const title = urlParams.get('title');
            
            if (title) document.title = `${title} | Wendy Q. Sun`;

            const container = document.getElementById('markdown-container');

            if (!file) {
                container.innerHTML = '<div class="error">No file specified.</div>';
                return;
            }

            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const text = await response.text();
                
                container.innerHTML = marked.parse(text);
                renderMath();

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="error"><h3>Error Loading Post</h3><p>Could not load: ${file}</p></div>`;
            }
        }
        
        function renderMath() {
            renderMathInElement(document.getElementById('markdown-container'), {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false}, 
                    {left: '\\[', right: '\\]', display: true}   
                ],
                throwOnError: false,
                errorColor: '#cc0000',
                strict: false,
                trust: false,
                macros: {
                    "\\RR": "\\mathbb{R}",
                    "\\NN": "\\mathbb{N}",
                    "\\ZZ": "\\mathbb{Z}",
                    "\\QQ": "\\mathbb{Q}",
                    "\\CC": "\\mathbb{C}"
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadMarkdownFile);
    </script>
</body>
</html>
